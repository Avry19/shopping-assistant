<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Assistant</title>
  <style>
    :root {
      --panel: #ffffff;
      --border: #d8dee9;
      --text: #1f2937;
      --muted: #667085;
      --accent: #5b7cff;
      --bot: #f8fafc;
      --choice: #ffffff;
      --choice-hover: #eef2ff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8faff 0%, #f2f4f8 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chat-shell {
      width: min(760px, 100%);
      min-height: 680px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: #fcfdff;
    }

    .avatar-frame {
      width: 88px;
      height: 88px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #f3f4f6;
      flex: 0 0 auto;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .assistant-meta h1 {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }

    .assistant-meta p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .messages {
      padding: 22px;
      overflow-y: auto;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
    }

    .message { display: flex; margin-bottom: 16px; }
    .message.bot { justify-content: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      background: var(--bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-btn {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--choice);
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-weight: 600;
    }

    .choice-btn:hover,
    .choice-btn:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--choice-hover);
    }

    .product-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .product-card {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 16px;
      padding: 14px;
    }

    .product-topline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .product-title { font-weight: 800; font-size: 1rem; }
    .product-price { font-weight: 800; color: #111827; }

    .product-line {
      margin: 4px 0;
      color: #374151;
      font-size: 0.93rem;
    }

    .product-line span {
      color: var(--muted);
      font-weight: 600;
    }

    .final-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .choose-btn,
    .skip-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .choose-btn {
      background: var(--accent);
      color: #fff;
      width: 100%;
      margin-top: 10px;
    }

    .skip-btn { background: #111827; color: #fff; }

    .footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: #fcfdff;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .hidden { display: none !important; }

    .debug-panel {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      font-size: 0.72rem;
      color: #475467;
      max-height: 90px;
      overflow: auto;
    }

    @media (max-width: 640px) {
      .page { padding: 10px; align-items: flex-start; }
      .chat-shell { min-height: 92vh; border-radius: 18px; }
      .chat-header { padding: 14px; }
      .avatar-frame { width: 72px; height: 72px; }
      .choice-grid { grid-template-columns: 1fr; }
      .bubble { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="chat-shell" aria-label="Shopping assistant">
      <header class="chat-header">
        <div class="avatar-frame" aria-hidden="true">
          <img class="avatar-img" id="avatarImg" alt="" />
        </div>
        <div class="assistant-meta">
          <h1 id="assistantName">Shopping Assistant</h1>
          <p>Earbuds recommendation assistant</p>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <footer class="footer">
        Please complete the assistant interaction before continuing in the survey.
        <div class="debug-panel hidden" id="debugPanel"></div>
      </footer>
    </section>
  </main>

  <script>
    /*
      Required image files in repo root:
      - cute-single.png
      - notcute-single.png

      The visible assistant name is intentionally held constant across all conditions.
      Condition IDs are used only internally for Qualtrics assignment and data logging.

      Qualtrics iframe URL:
      https://avry19.github.io/shopping-assistant/?pid=${e://Field/ResponseID}&condition=${e://Field/condition}
    */

    const QUALTRICS_PARENT_ORIGIN = "*";
    // After testing, replace "*" with your exact Qualtrics domain for stricter security.

    const URL_PARAMS = new URLSearchParams(window.location.search);
    const participantId = URL_PARAMS.get("pid") || URL_PARAMS.get("participant") || "debug_no_pid";
    const requestedCondition = URL_PARAMS.get("condition") || "cute_warm";
    const debugMode = URL_PARAMS.get("debug") === "1" && URL_PARAMS.get("showInternal") === "1";
    const ASSET_VERSION = "2026-04-22-v7";

    const SCRIPTS = {
      warm: {
        opening: "Hi, I’m Milo. I’m here to help you find earbuds that feel right for your everyday routine.",
        q1: "To start, what matters most to you when choosing earbuds?",
        afterQ1: "Thanks, that gives me a better sense of what you care about.",
        q2: "Where would you most often use them?",
        afterQ2: "Got it. That helps me understand when they need to work well for you.",
        q3: "Which feature would make them feel most useful for you?",
        recommendationIntro: "Thanks. Based on what you shared, these three options could each be a good fit in a different way.",
        finalInstruction: "Take a look and choose the option you would feel best about, or skip if none feel right.",
        completion: "Thanks, your choice has been saved. Please continue to the next part of the study when you’re ready."
      },
      task: {
        opening: "Hello, I’m Milo. I will identify earbuds that match your everyday-use requirements.",
        q1: "First, select the most important purchase criterion for your earbuds.",
        afterQ1: "Criterion recorded. The next input will specify usage context.",
        q2: "Select the main usage context.",
        afterQ2: "Usage context recorded. The final input will specify feature preference.",
        q3: "Select the most useful product feature.",
        recommendationIntro: "Based on your selected criteria, three options are displayed. Each option has a distinct trade-off.",
        finalInstruction: "Review the options and select one product, or select “Skip / don’t buy.”",
        completion: "Your selection has been recorded. Please continue to the next part of the study."
      }
    };

    const CONDITIONS = {
      cute_warm: {
        id: "cute_warm",
        avatarCuteness: "high",
        linguisticStyle: "warm",
        assistantName: "Milo",
        avatar: "cute-single.png",
        bgMode: "transparent",
        script: SCRIPTS.warm
      },
      cute_task: {
        id: "cute_task",
        avatarCuteness: "high",
        linguisticStyle: "task",
        assistantName: "Milo",
        avatar: "cute-single.png",
        bgMode: "transparent",
        script: SCRIPTS.task
      },
      notcute_warm: {
        id: "notcute_warm",
        avatarCuteness: "low",
        linguisticStyle: "warm",
        assistantName: "Milo",
        avatar: "notcute-single.png",
        bgMode: "corner",
        script: SCRIPTS.warm
      },
      notcute_task: {
        id: "notcute_task",
        avatarCuteness: "low",
        linguisticStyle: "task",
        assistantName: "Milo",
        avatar: "notcute-single.png",
        bgMode: "corner",
        script: SCRIPTS.task
      }
    };

    const CHOICES = {
      q1_priority: [
        { label: "Sound quality", value: "sound_quality" },
        { label: "Comfort", value: "comfort" },
        { label: "Battery life", value: "battery_life" },
        { label: "Ease of use", value: "ease_of_use" }
      ],
      q2_usage_context: [
        { label: "Studying or working", value: "studying_working" },
        { label: "Commuting", value: "commuting" },
        { label: "Exercise", value: "exercise" },
        { label: "General everyday use", value: "everyday_use" }
      ],
      q3_feature_preference: [
        { label: "Noise reduction", value: "noise_reduction" },
        { label: "Lightweight fit", value: "lightweight_fit" },
        { label: "Long battery life", value: "long_battery_life" },
        { label: "Simple controls", value: "simple_controls" }
      ]
    };

    const PRODUCTS = [
      { id: "earbuds_A", label: "Option A", price: 39, goodFor: "simple everyday use", strength: "affordable and lightweight", tradeoff: "shorter battery life" },
      { id: "earbuds_B", label: "Option B", price: 69, goodFor: "balanced everyday use", strength: "balanced sound, comfort, and battery", tradeoff: "standard noise reduction" },
      { id: "earbuds_C", label: "Option C", price: 99, goodFor: "feature-focused everyday use", strength: "stronger battery and noise control", tradeoff: "higher price" }
    ];

    const condition = CONDITIONS[requestedCondition] || CONDITIONS.cute_warm;

    const state = {
      participant_id: participantId,
      condition: condition.id,
      avatar_cuteness: condition.avatarCuteness,
      linguistic_style: condition.linguisticStyle,
      chatbot_started: "yes",
      chatbot_complete: "no",
      q1_priority: "",
      q2_usage_context: "",
      q3_feature_preference: "",
      recommendation_set: PRODUCTS.map(p => p.id).join("|"),
      recommendation_order: PRODUCTS.map(p => p.id).join("|"),
      selected_product_id: "",
      selected_product_price: "",
      purchase_decision: "",
      chatbot_start_timestamp: new Date().toISOString(),
      q1_timestamp: "",
      q2_timestamp: "",
      q3_timestamp: "",
      final_choice_timestamp: "",
      chatbot_event_log: []
    };

    const el = {
      avatarImg: document.getElementById("avatarImg"),
      assistantName: document.getElementById("assistantName"),
      messages: document.getElementById("messages"),
      debugPanel: document.getElementById("debugPanel")
    };

    function init() {
      document.title = "Shopping Assistant";
      el.assistantName.textContent = condition.assistantName;
      loadNormalisedAvatar(condition.avatar + "?v=" + ASSET_VERSION, condition.bgMode);

      if (debugMode) el.debugPanel.classList.remove("hidden");

      sendEventToQualtrics("chatbot_started", {});
      renderOpening();
      updateDebugPanel();
    }

    function loadNormalisedAvatar(src, bgMode) {
      const image = new Image();
      image.crossOrigin = "anonymous";

      image.onload = function() {
        try {
          el.avatarImg.src = normaliseAvatarToSquare(image, bgMode);
        } catch (error) {
          el.avatarImg.src = src;
        }
      };

      image.onerror = function() {
        el.avatarImg.src = src;
      };

      image.src = src;
    }

    function normaliseAvatarToSquare(image, bgMode) {
      const sourceCanvas = document.createElement("canvas");
      sourceCanvas.width = image.naturalWidth;
      sourceCanvas.height = image.naturalHeight;

      const sourceCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
      sourceCtx.drawImage(image, 0, 0);

      const imgData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
      const data = imgData.data;
      const width = sourceCanvas.width;
      const height = sourceCanvas.height;

      const bg = { r: data[0], g: data[1], b: data[2] };

      let minX = width, minY = height, maxX = 0, maxY = 0;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const i = (y * width + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];

          let isForeground = false;

          if (bgMode === "transparent") {
            isForeground = a > 24;
          } else {
            const distance = Math.sqrt(
              Math.pow(r - bg.r, 2) +
              Math.pow(g - bg.g, 2) +
              Math.pow(b - bg.b, 2)
            );
            isForeground = a > 24 && distance > 28;
          }

          if (!isForeground) {
            data[i + 3] = 0;
          } else {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (minX >= maxX || minY >= maxY) {
        return image.src;
      }

      sourceCtx.putImageData(imgData, 0, 0);

      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;
      const outputSize = 512;

      /*
        452px visible area leaves about 30px padding on each side.
        This prevents the not-cute avatar from being clipped while keeping
        the cute avatar comparable in scale.
      */
      const visibleSize = 452;
      const scale = Math.min(visibleSize / cropW, visibleSize / cropH);
      const drawW = cropW * scale;
      const drawH = cropH * scale;
      const dx = (outputSize - drawW) / 2;
      const dy = (outputSize - drawH) / 2;

      const outputCanvas = document.createElement("canvas");
      outputCanvas.width = outputSize;
      outputCanvas.height = outputSize;
      const outputCtx = outputCanvas.getContext("2d");
      outputCtx.clearRect(0, 0, outputSize, outputSize);
      outputCtx.drawImage(sourceCanvas, minX, minY, cropW, cropH, dx, dy, drawW, drawH);

      return outputCanvas.toDataURL("image/png");
    }

    function renderOpening() {
      clearMessages();
      addBotMessage(condition.script.opening);
      addQuestion(condition.script.q1, CHOICES.q1_priority, "q1_priority");
    }

    function handleChoice(field, value, label) {
      state[field] = value;

      if (field === "q1_priority") {
        state.q1_timestamp = new Date().toISOString();
        logEvent("q1_selected", { field, value, label });
        sendEventToQualtrics("q1_selected", { [field]: value, q1_timestamp: state.q1_timestamp });
        clearMessages();
        addBotMessage(condition.script.afterQ1);
        addQuestion(condition.script.q2, CHOICES.q2_usage_context, "q2_usage_context");
      }

      if (field === "q2_usage_context") {
        state.q2_timestamp = new Date().toISOString();
        logEvent("q2_selected", { field, value, label });
        sendEventToQualtrics("q2_selected", { [field]: value, q2_timestamp: state.q2_timestamp });
        clearMessages();
        addBotMessage(condition.script.afterQ2);
        addQuestion(condition.script.q3, CHOICES.q3_feature_preference, "q3_feature_preference");
      }

      if (field === "q3_feature_preference") {
        state.q3_timestamp = new Date().toISOString();
        logEvent("q3_selected", { field, value, label });
        sendEventToQualtrics("q3_selected", { [field]: value, q3_timestamp: state.q3_timestamp });
        clearMessages();
        addBotMessage(condition.script.recommendationIntro);
        addRecommendationScreen();
      }

      updateDebugPanel();
    }

    function handleFinalChoice(productId) {
      state.final_choice_timestamp = new Date().toISOString();
      state.chatbot_complete = "yes";

      if (productId === "none") {
        state.selected_product_id = "none";
        state.selected_product_price = "";
        state.purchase_decision = "no_purchase";
      } else {
        const product = PRODUCTS.find(p => p.id === productId);
        state.selected_product_id = product.id;
        state.selected_product_price = String(product.price);
        state.purchase_decision = "yes_purchase";
      }

      logEvent("final_choice", {
        selected_product_id: state.selected_product_id,
        selected_product_price: state.selected_product_price,
        purchase_decision: state.purchase_decision
      });

      sendEventToQualtrics("final_choice", {
        chatbot_complete: state.chatbot_complete,
        q1_priority: state.q1_priority,
        q2_usage_context: state.q2_usage_context,
        q3_feature_preference: state.q3_feature_preference,
        recommendation_set: state.recommendation_set,
        recommendation_order: state.recommendation_order,
        selected_product_id: state.selected_product_id,
        selected_product_price: state.selected_product_price,
        purchase_decision: state.purchase_decision,
        final_choice_timestamp: state.final_choice_timestamp,
        chatbot_event_log: JSON.stringify(state.chatbot_event_log)
      });

      clearMessages();
      addBotMessage(condition.script.completion);
      updateDebugPanel();
    }

    function clearMessages() {
      el.messages.innerHTML = "";
    }

    function addBotMessage(text) {
      const wrapper = document.createElement("div");
      wrapper.className = "message bot";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.appendChild(bubble);
      el.messages.appendChild(wrapper);
      scrollMessages();
    }

    function addQuestion(text, choices, field) {
      const wrapper = document.createElement("div");
      wrapper.className = "message bot";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const question = document.createElement("div");
      question.textContent = text;
      bubble.appendChild(question);

      const grid = document.createElement("div");
      grid.className = "choice-grid";

      choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.type = "button";
        button.textContent = choice.label;
        button.addEventListener("click", () => handleChoice(field, choice.value, choice.label));
        grid.appendChild(button);
      });

      bubble.appendChild(grid);
      wrapper.appendChild(bubble);
      el.messages.appendChild(wrapper);
      scrollMessages();
    }

    function addRecommendationScreen() {
      const wrapper = document.createElement("div");
      wrapper.className = "message bot";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const instruction = document.createElement("div");
      instruction.textContent = condition.script.finalInstruction;
      bubble.appendChild(instruction);

      const productList = document.createElement("div");
      productList.className = "product-list";

      PRODUCTS.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
          <div class="product-topline">
            <div class="product-title">${escapeHtml(product.label)}</div>
            <div class="product-price">€${product.price}</div>
          </div>
          <div class="product-line"><span>Good for:</span> ${escapeHtml(product.goodFor)}</div>
          <div class="product-line"><span>Main strength:</span> ${escapeHtml(product.strength)}</div>
          <div class="product-line"><span>Trade-off:</span> ${escapeHtml(product.tradeoff)}</div>
        `;

        const choose = document.createElement("button");
        choose.className = "choose-btn";
        choose.type = "button";
        choose.textContent = `Choose ${product.label}`;
        choose.addEventListener("click", () => handleFinalChoice(product.id));

        card.appendChild(choose);
        productList.appendChild(card);
      });

      const finalActions = document.createElement("div");
      finalActions.className = "final-actions";

      const skip = document.createElement("button");
      skip.className = "skip-btn";
      skip.type = "button";
      skip.textContent = "Skip / don’t buy";
      skip.addEventListener("click", () => handleFinalChoice("none"));

      finalActions.appendChild(skip);

      bubble.appendChild(productList);
      bubble.appendChild(finalActions);
      wrapper.appendChild(bubble);
      el.messages.appendChild(wrapper);
      scrollMessages();
    }

    function logEvent(eventType, payload) {
      state.chatbot_event_log.push({
        event_type: eventType,
        timestamp: new Date().toISOString(),
        ...payload
      });
    }

    function sendEventToQualtrics(eventType, payload) {
      const message = {
        source: "shopping_assistant_chatbot",
        event_type: eventType,
        participant_id: state.participant_id,
        condition: state.condition,
        avatar_cuteness: state.avatar_cuteness,
        linguistic_style: state.linguistic_style,
        chatbot_started: state.chatbot_started,
        chatbot_start_timestamp: state.chatbot_start_timestamp,
        ...payload
      };

      window.parent.postMessage(message, QUALTRICS_PARENT_ORIGIN);
    }

    function updateDebugPanel() {
      if (!debugMode) return;
      el.debugPanel.textContent = JSON.stringify({
        participant_id: state.participant_id,
        condition: state.condition,
        avatar_cuteness: state.avatar_cuteness,
        linguistic_style: state.linguistic_style,
        q1_priority: state.q1_priority,
        q2_usage_context: state.q2_usage_context,
        q3_feature_preference: state.q3_feature_preference,
        selected_product_id: state.selected_product_id,
        purchase_decision: state.purchase_decision,
        chatbot_complete: state.chatbot_complete
      }, null, 2);
    }

    function scrollMessages() {
      requestAnimationFrame(() => {
        el.messages.scrollTop = el.messages.scrollHeight;
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    init();
  </script>
</body>
</html>
